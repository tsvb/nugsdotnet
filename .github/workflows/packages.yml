name: packages

# Publishes the reusable class libraries (Shared, Core, UI) as NuGet packages to
# GitHub Packages — this is what populates the repo's "Packages" section. Uses the
# built-in GITHUB_TOKEN (no PAT needed). Run manually via the Actions tab (or
# `gh workflow run packages.yml -f version=X.Y.Z`); it also publishes on release
# tags so the package versions track the app.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.2.1)'
        required: true
        default: '0.2.1'
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Publishing libraries at version $v"

      - name: Pack libraries
        shell: bash
        env:
          VER: ${{ steps.ver.outputs.version }}
          REPO: https://github.com/${{ github.repository }}
        run: |
          set -e
          pack() { # $1 = csproj, $2 = description
            dotnet pack "$1" -c Release \
              -p:PackageVersion="$VER" \
              -p:Authors="Tim Vanbenschoten" \
              -p:Description="$2" \
              -p:RepositoryUrl="$REPO" -p:RepositoryType=git \
              -p:PackageProjectUrl="$REPO" \
              -o ./nupkgs
          }
          # Avoid commas/semicolons in -p:Description — MSBuild splits property
          # values on them (MSB1006).
          pack src/Nugsdotnet.Shared/Nugsdotnet.Shared.csproj "Shared DTOs for nugsdotnet - a personal nugs.net client."
          pack src/Nugsdotnet.Core/Nugsdotnet.Core.csproj     "Core services for nugsdotnet - nugs API client token store and minimal-API endpoints."
          pack src/Nugsdotnet.UI/Nugsdotnet.UI.csproj         "Razor UI components for nugsdotnet."

      - name: Push to GitHub Packages
        shell: bash
        env:
          FEED: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          for pkg in ./nupkgs/*.nupkg; do
            echo "pushing $pkg"
            dotnet nuget push "$pkg" --source "$FEED" --api-key "$TOKEN" --skip-duplicate
          done
