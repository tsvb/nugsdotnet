name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          # MAUI's ApplicationDisplayVersion must be a plain 3-part numeric
          # version, so strip any pre-release/build suffix (0.2.0-rc1 -> 0.2.0).
          # The full version is still used for the installer/release/manifest.
          $app = ($v -split '[-+]')[0]
          "version=$v" >> $env:GITHUB_OUTPUT
          "appversion=$app" >> $env:GITHUB_OUTPUT

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore MAUI workload
        run: dotnet workload restore src/Nugsdotnet.App/Nugsdotnet.App.csproj

      - name: Publish (self-contained, win-x64)
        run: >
          dotnet publish src/Nugsdotnet.App/Nugsdotnet.App.csproj -c Release
          -f net10.0-windows10.0.19041.0 -p:RuntimeIdentifier=win-x64
          -p:SelfContained=true -p:WindowsAppSDKSelfContained=true
          -p:WindowsPackageType=None
          -p:ApplicationDisplayVersion=${{ steps.ver.outputs.appversion }}

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: >
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          /DMyAppVersion=${{ steps.ver.outputs.version }}
          "/DPublishDir=${{ github.workspace }}\src\Nugsdotnet.App\bin\Release\net10.0-windows10.0.19041.0\win-x64\publish"
          packaging\installer.iss

      - name: Sign installer (placeholder hook — signing deferred)
        shell: pwsh
        run: Write-Host "Signing deferred. See docs/RELEASING.md (Azure Trusted Signing) to enable."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/Output/nugsdotnet-${{ steps.ver.outputs.version }}-x64-setup.exe
          generate_release_notes: true

      - name: Generate winget manifests from template (always)
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $installer = "packaging/Output/nugsdotnet-$ver-x64-setup.exe"
          $sha = (Get-FileHash $installer -Algorithm SHA256).Hash
          $url = "https://github.com/tsvb/nugsdotnet/releases/download/${{ github.ref_name }}/nugsdotnet-$ver-x64-setup.exe"
          $outDir = "$env:RUNNER_TEMP\winget-out"
          New-Item -ItemType Directory -Force $outDir | Out-Null
          # Fill the checked-in template with this release's version, URL, and SHA256.
          Get-ChildItem packaging/winget/*.yaml | ForEach-Object {
            $text = Get-Content $_.FullName -Raw
            $text = $text -replace 'PackageVersion: .*', "PackageVersion: $ver"
            $text = $text -replace 'InstallerUrl: .*', "InstallerUrl: $url"
            $text = $text -replace 'InstallerSha256: .*', "InstallerSha256: $sha"
            Set-Content -Path (Join-Path $outDir $_.Name) -Value $text -NoNewline
          }
          Compress-Archive -Path "$outDir\*" -DestinationPath "$env:RUNNER_TEMP\nugsdotnet-$ver-winget-manifests.zip"

      - name: Attach manifests to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} "$env:RUNNER_TEMP\nugsdotnet-${{ steps.ver.outputs.version }}-winget-manifests.zip"

      - name: Check for winget submission token
        id: tok
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if ([string]::IsNullOrEmpty($env:WINGET_TOKEN)) { "present=false" >> $env:GITHUB_OUTPUT }
          else { "present=true" >> $env:GITHUB_OUTPUT }

      - name: Submit to winget-pkgs (only when token present)
        if: steps.tok.outputs.present == 'true'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          # Pinned Komac — its release asset name embeds the version, so there is
          # no stable "latest" filename. Bump $kv to update Komac.
          $kv = "2.16.0"
          $komacUrl = "https://github.com/russellbanks/Komac/releases/download/v$kv/komac-$kv-x86_64-pc-windows-msvc.exe"
          Invoke-WebRequest -Uri $komacUrl -OutFile "$env:RUNNER_TEMP\komac.exe"
          $url = "https://github.com/tsvb/nugsdotnet/releases/download/${{ github.ref_name }}/nugsdotnet-${{ steps.ver.outputs.version }}-x64-setup.exe"
          # 'new' creates a first-time package. After tsvb.nugsdotnet is accepted
          # into winget-pkgs, switch 'new' to 'update' for later releases.
          & "$env:RUNNER_TEMP\komac.exe" new tsvb.nugsdotnet `
            --version ${{ steps.ver.outputs.version }} `
            --urls $url `
            --submit
