name: native

# Compile gate for the native WinUI head + the cross-platform Core tests.
# The WinUI XAML compiler only runs on Windows, so the windows-latest job is
# the ONLY automated compile check the app project gets — non-Windows dev
# environments (including Claude Code sessions) can build and test Core but
# not the app itself. Keep this green before merging UI work.
on:
  push:
    paths:
      - 'native/**'
      - '.github/workflows/native.yml'
  pull_request:
    paths:
      - 'native/**'
      - '.github/workflows/native.yml'

permissions:
  contents: read

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test Core (cross-platform)
        run: dotnet test native/Nugsdotnet.Native.Tests/Nugsdotnet.Native.Tests.csproj -c Release --nologo

  winui-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # x64 only — this is a compile gate, not a release build; arm64 doubles
      # the wall clock for no extra type/XAML coverage.
      - name: Build WinUI head (Release x64)
        run: dotnet build native/Nugsdotnet.Native/Nugsdotnet.Native.csproj -c Release -p:Platform=x64 -p:RuntimeIdentifier=win-x64 --nologo
